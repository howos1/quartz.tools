<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quartz</title>
    <link rel="icon" type="image/x-icon" href="img/favicon-512x512.png">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="A simple, open-source Spotify downloader. Save your favorite music in high quality, completely free and without ads.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://quartz.furrysobachka.ru/">
    <meta property="og:title" content="quartz.musix">
    <meta property="og:description" content="A simple, open-source Spotify downloader. Save your favorite music in high quality, completely free and without ads.">
    <meta property="og:image" content="https://quartz.furrysobachka.ru/img/banner.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="quartz.musix">
    <meta name="twitter:description" content="A simple, open-source Spotify downloader. Save your favorite music in high quality, completely free and without ads.">
    <meta name="twitter:image" content="https://quartz.furrysobachka.ru/img/banner.png">
</head>
<body>
    <div class="wrapper">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-logo">
                    <img src="/img/quartz.png" alt="quartz logo">
                </div>
                <nav class="sidebar-nav">
                    <a href="#" class="nav-item active" data-tab="music" title="music">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 18V5l12-2v13"></path>
                            <circle cx="6" cy="18" r="3"></circle>
                            <circle cx="18" cy="16" r="3"></circle>
                        </svg>
                        <span class="nav-label">music</span>
                    </a>
                    <a href="#" class="nav-item" data-tab="images" title="images">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <span class="nav-label">images</span>
                    </a>
                </nav>
            </div>
            <div class="sidebar-bottom">
                <a href="https://github.com" target="_blank" class="nav-item" title="github">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                    </svg>
                    <span class="nav-label">github</span>
                </a>
            </div>
        </aside>

        <div class="content-layout">
            <header class="header" id="mainHeader">
                <h1 class="logo">quartz.<span>musix</span></h1>
                <p class="subtitle">download tracks in real time</p>
            </header>

            <div id="musicTab" class="tab-content active">
                <div class="interface-container">
                    <div class="turnstile-badge verifying" id="captchaBadge" title="cf-turnstile">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path>
                            <path d="M12 6v6l4 2"></path>
                        </svg>
                    </div>

                    <main class="main-panel">
                        <div class="input-wrapper">
                            <input type="text" id="urlInput" placeholder="paste link to track..." autocomplete="off" spellcheck="false">
                        </div>
                        <div class="controls">
                            <button class="icon-btn" id="settingsToggleBtn" title="Settings" onclick="toggleSettings()">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="3"></circle>
                                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                                </svg>
                            </button>
                            <button class="action-btn" id="downloadBtn" onclick="processDownload()">
                                <p>&gt;&gt;</p>
                            </button>
                        </div>
                    </main>
                </div>

                <div class="settings-container-grid" id="settingsGrid">
                    <div class="settings-panel">
                        <div class="settings-content">
                            <div class="setting-row">
                                <span class="setting-label">audio format</span>
                                <div class="select-wrapper">
                                    <select id="audioFormat">
                                        <option value="mp3">mp3 (320kbps)</option>
                                        <option value="flac">flac (lossless)</option>
                                        <option value="opus">opus (ogg)</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="imagesTab" class="tab-content">
                <div class="image-panel">
                    <div class="image-upload">
                        <label class="upload-label" id="imageLabel" for="imageInput">choose an image...</label>
                        <input type="file" id="imageInput" accept="image/*">
                    </div>
                    <div class="image-controls">
                        <button class="icon-btn" id="imageSettingsToggleBtn" title="Settings" onclick="toggleImageSettings()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                            </svg>
                        </button>
                        <button class="action-btn" id="convertBtn" onclick="processImageConvert()">
                            <p>&gt;&gt;</p>
                        </button>
                    </div>
                </div>

                <div class="settings-container-grid" id="imageSettingsGrid">
                    <div class="settings-panel">
                        <div class="settings-content">
                            <div class="setting-row">
                                <span class="setting-label">output format</span>
                                <div class="select-wrapper">
                                    <select id="imageFormat">
                                        <option value="png">png</option>
                                        <option value="jpg">jpg</option>
                                        <option value="webp">webp</option>
                                        <option value="ico">ico</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="hidden-captcha">
                <div class="cf-turnstile" id="turnstileWidget" data-sitekey=" " data-theme="dark" data-callback="onCaptchaSuccess" data-expired-callback="onCaptchaExpired" data-error-callback="onCaptchaError"></div>
            </div>

            <div class="status-container">
                <div class="loader" id="loader"></div>
                <div class="status" id="statusMessage"></div>
            </div>

            <footer class="footer">
                inspired by <a href="https://cobalt.tools" target="_blank">cobalt.tools</a>
            </footer>
        </div>
    </div>
    <script src="/main.js"></script>
</body>
</html>
